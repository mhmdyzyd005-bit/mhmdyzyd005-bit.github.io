<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>آسف</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }
    .box {
      background: rgba(255, 255, 255, 0.1);
      padding: 50px 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      max-width: 500px;
    }
    h1 {
      font-size: 60px;
      margin-bottom: 20px;
    }
    p {
      font-size: 20px;
      line-height: 1.8;
      margin-bottom: 30px;
    }
    .btn {
      background: white;
      color: #764ba2;
      padding: 12px 30px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      transition: 0.3s;
    }
    .btn:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>😔 آسف</h1>
    <p>بعتذر من قلبي<br>
    حقك عليا والله<br>
    اتمنى تسامحني 🙏</p>
    <a href="#" class="btn">نتكلم؟</a>
  </div>
</body>
  </html>
